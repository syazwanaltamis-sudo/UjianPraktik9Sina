<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.rtl.min.css" integrity="sha384-DOXMLfHhQkvFFp+rWTZwVlPVqdIhpDVYT9csOnHSgWQWPX0v5MCGtjCJbY6ERspU" crossorigin="anonymous">

    <title>Toko Online</title>


</head>
<body>
    <!--Navbar-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Toko Niyaz</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-navc ms-auto">
                <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#produk">Produk</a></li>
                <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
            </ul>
        </div>
        </div>
    </nav>
<!--Main Content-->
    <div class="bg-light p-5 text-center">
        <h1>Selamat Datang Di Toko Niyaz</h1>
        <p>Toko Online Simpel</p>    
    </div>
    <section id="produk" class="container py-5">
        <h2 class="text-center mb-4">Produk</h2>

        <div class="row">

<!--Project-->
            <div class="col-md-3">
                <div class="card">
                    <img src="sepatu1.jfif" class="card-img-top">
                    <div class="card-body text-center">
                        <h5>Sepatu</h5>
                        <p>Rp 2.000.000</p>
                        <button class="btn btn-primary">Beli</button>
                    </div>
                </div>
            </div>


            <div class="col-md-3">
                <div class="card">
                    <img src="tas.webp" class="card-img-top">
                    <div class="card-body text-center">
                        <h5>Tas</h5>
                        <p>Rp 150.000</p>
                        <button class="btn btn-primary">Beli</button>
                    </div>
                </div>
            </div>


            <div class="col-md-3">
                <div class="card">
                    <img src="jam tangan.webp" class="card-img-top">
                    <div class="card-body text-center">
                        <h5>Jam Tangan</h5>
                        <p>Rp 500.000</p>
                        <button class="btn btn-primary">Beli</button>
                    </div>
                </div>
            </div>


            <div class="col-md-3">
                <div class="card">
                    <img src="headset.jpg" class="card-img-top">
                    <div class="card-body text-center">
                        <h5>Headset</h5>
                        <p>Rp 150.000</p>
                        <button class="btn btn-primary">Beli</button>
                    </div>
                </div>
            </div>

        </div>

    </section>


<!--Contact-->
    <section id="contact" class="bg-light py-5">

        <div class="container">

            <h2 class="text-center mb-4">Contact</h2>

            <div class="row justify-content-center">

                <div class="`col-md-6">

                    <form>

                        <div class="mb-3">
                            <label class="form-label">Nama</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Pesan</label>
                            <textarea class="form-control"></textarea>
                        </div>

                        <button class="btn btn-primary">Kirim</button>

                    </form>

                </div>

            </div>

        </div>

    </section>


    <footer class="'bg-dark text white text-center p-3">
        <p>Website Ujian Praktik</p>
    </footer>

    <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
